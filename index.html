<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panini Card Maker</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2d3540;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f0b429;
    --accent-2: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  nav button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-left: 8px;
  }
  nav button.active { background: var(--accent-2); border-color: var(--accent-2); }
  nav button:hover { border-color: var(--accent-2); }

  main { padding: 22px; max-width: 1200px; margin: 0 auto; }

  /* Editor layout */
  .editor { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
  @media (max-width: 820px) { .editor { grid-template-columns: 1fr; } }

  .form { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .form h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 9px 10px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;
  }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  canvas {
    border-radius: 16px; background: #000; max-width: 100%; height: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
  }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .btn {
    padding: 10px 18px; border-radius: 9px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600;
  }
  .btn-primary { background: var(--accent); color: #1a1a1a; }
  .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn:hover { filter: brightness(1.1); }

  /* Gallery */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
  .card-item { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-item img { width: 100%; display: block; background: #000; }
  .card-item .meta { padding: 10px 12px; }
  .card-item .meta .nm { font-weight: 600; font-size: 14px; }
  .card-item .meta .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-item .ops { display: flex; border-top: 1px solid var(--border); }
  .card-item .ops button {
    flex: 1; background: transparent; border: none; color: var(--muted);
    padding: 9px 0; cursor: pointer; font-size: 12px;
  }
  .card-item .ops button:hover { background: var(--panel-2); color: var(--text); }
  .card-item .ops button + button { border-left: 1px solid var(--border); }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .hidden { display: none; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent-2); color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>PANINI <span>Card Maker</span></h1>
  <nav>
    <button id="tab-editor" class="active">에디터</button>
    <button id="tab-gallery">내 카드함</button>
  </nav>
</header>

<main>
  <!-- EDITOR -->
  <section id="view-editor" class="editor">
    <div class="form">
      <h2>카드 정보</h2>
      <div class="field">
        <label>사진 업로드</label>
        <input type="file" id="photo" accept="image/*" />
      </div>
      <div class="field">
        <label>선수명</label>
        <input type="text" id="name" placeholder="홍길동" maxlength="20" />
      </div>
      <div class="row">
        <div class="field"><label>포지션</label><input type="text" id="position" placeholder="FW" maxlength="6" /></div>
        <div class="field"><label>등번호</label><input type="text" id="number" placeholder="10" maxlength="3" /></div>
      </div>
      <div class="row">
        <div class="field"><label>팀</label><input type="text" id="team" placeholder="FC SEOUL" maxlength="20" /></div>
        <div class="field"><label>시즌</label><input type="text" id="season" placeholder="2025/26" maxlength="10" /></div>
      </div>
      <div class="row">
        <div class="field">
          <label>종목 테마</label>
          <select id="sport">
            <option value="soccer">축구</option>
            <option value="basketball">농구</option>
            <option value="baseball">야구</option>
          </select>
        </div>
        <div class="field">
          <label>레어도</label>
          <select id="rarity">
            <option value="base">Base</option>
            <option value="silver">Silver</option>
            <option value="gold">Gold</option>
            <option value="holo">Holo</option>
          </select>
        </div>
      </div>

      <h2 style="margin-top:18px">스탯</h2>
      <div class="stats-grid">
        <div class="field"><label>스피드 (PAC)</label><input type="number" id="s1" min="0" max="99" value="85" /></div>
        <div class="field"><label>슛 (SHO)</label><input type="number" id="s2" min="0" max="99" value="80" /></div>
        <div class="field"><label>패스 (PAS)</label><input type="number" id="s3" min="0" max="99" value="78" /></div>
        <div class="field"><label>드리블 (DRI)</label><input type="number" id="s4" min="0" max="99" value="88" /></div>
      </div>
    </div>

    <div class="preview-wrap">
      <canvas id="card" width="600" height="840"></canvas>
      <div class="actions">
        <button class="btn btn-primary" id="save">저장 (IndexedDB)</button>
        <button class="btn btn-secondary" id="export">PNG 다운로드</button>
        <button class="btn btn-secondary" id="reset">새 카드</button>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section id="view-gallery" class="hidden">
    <div class="toolbar">
      <h2 style="margin:0;font-size:16px">내 카드함 <span id="count" style="color:var(--muted);font-weight:400"></span></h2>
      <div>
        <button class="btn btn-secondary" id="export-all">전체 백업(JSON)</button>
        <label class="btn btn-secondary" style="cursor:pointer">
          가져오기<input type="file" id="import-file" accept="application/json" class="hidden" />
        </label>
      </div>
    </div>
    <div id="gallery" class="gallery"></div>
    <div id="empty" class="empty hidden">아직 저장된 카드가 없습니다. 에디터에서 카드를 만들어 저장해 보세요.</div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Panini Card Maker — 단일 HTML 프로토타입
   - Canvas 렌더링 + IndexedDB 로컬 저장
   ============================================================ */

/* ---------- IndexedDB 래퍼 ---------- */
const DB_NAME = 'paniniCardMaker';
const STORE = 'cards';
const DRAFT_STORE = 'draft';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: 'id' });
      if (!db.objectStoreNames.contains(DRAFT_STORE)) db.createObjectStore(DRAFT_STORE, { keyPath: 'id' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function tx(store, mode, fn) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const result = fn(s);
    t.oncomplete = () => resolve(result && result.result !== undefined ? result.result : result);
    t.onerror = () => reject(t.error);
  });
}

const dbApi = {
  put: (card) => tx(STORE, 'readwrite', (s) => s.put(card)),
  all: () => tx(STORE, 'readonly', (s) => s.getAll()),
  del: (id) => tx(STORE, 'readwrite', (s) => s.delete(id)),
  saveDraft: (d) => tx(DRAFT_STORE, 'readwrite', (s) => s.put({ ...d, id: 'current' })),
  getDraft: () => tx(DRAFT_STORE, 'readonly', (s) => s.get('current')),
};

/* ---------- 상태 ---------- */
let currentImage = null;     // HTMLImageElement
let currentImageBlob = null; // 원본 Blob (저장용)
let editingId = null;        // 편집 중인 카드 id (없으면 새 카드)

const $ = (id) => document.getElementById(id);
const fields = ['name','position','number','team','season','sport','rarity','s1','s2','s3','s4'];

/* ---------- 테마 ---------- */
const THEMES = {
  base:   { bg1: '#3a4a5a', bg2: '#1c2530', accent: '#aab7c4', label: 'BASE' },
  silver: { bg1: '#9aa6b2', bg2: '#4b5563', accent: '#e2e8f0', label: 'SILVER' },
  gold:   { bg1: '#c79a2e', bg2: '#6b4f12', accent: '#ffd75e', label: 'GOLD' },
  holo:   { bg1: '#7b2ff7', bg2: '#1f7cf2', accent: '#ff5edf', label: 'HOLO' },
};

/* ---------- 렌더링 ---------- */
function render() {
  const c = $('card');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const data = collect();
  const theme = THEMES[data.rarity] || THEMES.base;

  ctx.clearRect(0, 0, W, H);

  // 배경 그라데이션
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, theme.bg1);
  grad.addColorStop(1, theme.bg2);
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, W, H, 32); ctx.fill();

  // Holo 반짝임 오버레이
  if (data.rarity === 'holo') {
    const hg = ctx.createLinearGradient(0, 0, W, H);
    hg.addColorStop(0, 'rgba(255,255,255,0.12)');
    hg.addColorStop(0.5, 'rgba(255,255,255,0.0)');
    hg.addColorStop(1, 'rgba(255,255,255,0.12)');
    ctx.fillStyle = hg;
    roundRect(ctx, 0, 0, W, H, 32); ctx.fill();
  }

  // 사진 영역
  const px = 40, py = 110, pw = W - 80, ph = 460;
  ctx.save();
  roundRect(ctx, px, py, pw, ph, 18); ctx.clip();
  ctx.fillStyle = '#0b0f14';
  ctx.fillRect(px, py, pw, ph);
  if (currentImage) {
    drawImageCover(ctx, currentImage, px, py, pw, ph);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('사진을 업로드하세요', px + pw/2, py + ph/2);
  }
  ctx.restore();

  // 사진 테두리
  ctx.strokeStyle = theme.accent; ctx.lineWidth = 3;
  roundRect(ctx, px, py, pw, ph, 18); ctx.stroke();

  // 상단: 레어도 라벨 + 등번호
  ctx.fillStyle = theme.accent;
  ctx.font = 'bold 26px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(theme.label, 40, 64);

  if (data.number) {
    ctx.textAlign = 'right';
    ctx.font = 'bold 56px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('#' + data.number, W - 40, 70);
  }

  // 선수명
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText(data.name || '선수명', 40, py + ph + 64);

  // 팀 · 포지션 · 시즌
  ctx.fillStyle = theme.accent;
  ctx.font = '22px sans-serif';
  const sub = [data.team, data.position, data.season].filter(Boolean).join('  •  ');
  ctx.fillText(sub || 'TEAM • POS • SEASON', 40, py + ph + 98);

  // 스탯 바
  const labels = ['PAC','SHO','PAS','DRI'];
  const vals = [data.s1, data.s2, data.s3, data.s4];
  const sy = py + ph + 130;
  const sw = (W - 80) / 4;
  for (let i = 0; i < 4; i++) {
    const x = 40 + i * sw;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 34px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(vals[i] || '0', x + sw/2, sy + 36);
    ctx.fillStyle = theme.accent;
    ctx.font = '16px sans-serif';
    ctx.fillText(labels[i], x + sw/2, sy + 60);
  }

  // 외곽 테두리
  ctx.strokeStyle = theme.accent; ctx.lineWidth = 6;
  roundRect(ctx, 3, 3, W-6, H-6, 30); ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawImageCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height;
  const r = w / h;
  let sw, sh, sx, sy;
  if (ir > r) { sh = img.height; sw = sh * r; sx = (img.width - sw)/2; sy = 0; }
  else { sw = img.width; sh = sw / r; sx = 0; sy = (img.height - sh)/2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

/* ---------- 폼 데이터 ---------- */
function collect() {
  const d = {};
  fields.forEach(f => d[f] = $(f).value);
  return d;
}
function fill(d) {
  fields.forEach(f => { if (d[f] !== undefined) $(f).value = d[f]; });
}

/* ---------- 이미지 로드 ---------- */
function loadImageFromBlob(blob) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(blob);
  });
}

$('photo').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  currentImageBlob = file;
  currentImage = await loadImageFromBlob(file);
  render();
  saveDraftDebounced();
});

/* ---------- 폼 변경 → 렌더 + 임시저장 ---------- */
fields.forEach(f => $(f).addEventListener('input', () => { render(); saveDraftDebounced(); }));

let draftTimer;
function saveDraftDebounced() {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(async () => {
    const draft = { fields: collect(), imageBlob: currentImageBlob, editingId };
    try { await dbApi.saveDraft(draft); } catch (e) { /* ignore */ }
  }, 500);
}

/* ---------- 저장 ---------- */
function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve) => canvas.toBlob(resolve, type, quality));
}
function uid() {
  return 'c_' + Math.abs(performance.now()|0).toString(36) + '_' + (crypto.getRandomValues(new Uint32Array(1))[0]).toString(36);
}

$('save').addEventListener('click', async () => {
  const canvas = $('card');
  const thumbBlob = await canvasToBlob(canvas, 'image/png');
  const data = collect();
  const now = new Date().toISOString();
  const id = editingId || uid();
  const card = {
    id,
    name: data.name || '무제',
    sport: data.sport,
    rarity: data.rarity,
    fields: data,
    imageBlob: currentImageBlob || null,
    thumbBlob,
    createdAt: editingId ? undefined : now,
    updatedAt: now,
  };
  // 기존 createdAt 유지
  if (editingId) {
    const all = await dbApi.all();
    const prev = all.find(c => c.id === editingId);
    card.createdAt = prev ? prev.createdAt : now;
  }
  await dbApi.put(card);
  editingId = id;
  toast('카드가 저장되었습니다 ✓');
});

/* ---------- PNG 다운로드 ---------- */
$('export').addEventListener('click', async () => {
  const blob = await canvasToBlob($('card'), 'image/png');
  const data = collect();
  downloadBlob(blob, `${(data.name || 'card')}_${data.rarity}.png`);
});

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ---------- 새 카드 ---------- */
$('reset').addEventListener('click', () => {
  editingId = null;
  currentImage = null;
  currentImageBlob = null;
  $('photo').value = '';
  $('name').value = ''; $('position').value = ''; $('number').value = '';
  $('team').value = ''; $('season').value = '';
  $('s1').value = 85; $('s2').value = 80; $('s3').value = 78; $('s4').value = 88;
  render();
  saveDraftDebounced();
  toast('새 카드 작성 모드');
});

/* ---------- 탭 전환 ---------- */
$('tab-editor').addEventListener('click', () => switchTab('editor'));
$('tab-gallery').addEventListener('click', () => { switchTab('gallery'); renderGallery(); });

function switchTab(tab) {
  $('tab-editor').classList.toggle('active', tab === 'editor');
  $('tab-gallery').classList.toggle('active', tab === 'gallery');
  $('view-editor').classList.toggle('hidden', tab !== 'editor');
  $('view-gallery').classList.toggle('hidden', tab !== 'gallery');
}

/* ---------- 갤러리 ---------- */
async function renderGallery() {
  const cards = (await dbApi.all()).sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
  const g = $('gallery');
  g.innerHTML = '';
  $('count').textContent = `(${cards.length})`;
  $('empty').classList.toggle('hidden', cards.length > 0);

  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card-item';
    const url = URL.createObjectURL(card.thumbBlob);
    el.innerHTML = `
      <img src="${url}" alt="${escapeHtml(card.name)}" />
      <div class="meta">
        <div class="nm">${escapeHtml(card.name)}</div>
        <div class="sub">${escapeHtml(card.fields.team || '')} · ${(card.rarity||'').toUpperCase()}</div>
      </div>
      <div class="ops">
        <button data-act="edit">편집</button>
        <button data-act="dup">복제</button>
        <button data-act="del">삭제</button>
      </div>`;
    el.querySelector('[data-act="edit"]').onclick = () => loadCard(card, false);
    el.querySelector('[data-act="dup"]').onclick = () => loadCard(card, true);
    el.querySelector('[data-act="del"]').onclick = async () => {
      if (confirm(`"${card.name}" 카드를 삭제할까요?`)) { await dbApi.del(card.id); renderGallery(); toast('삭제됨'); }
    };
    g.appendChild(el);
  });
}

async function loadCard(card, asDuplicate) {
  fill(card.fields);
  editingId = asDuplicate ? null : card.id;
  currentImageBlob = card.imageBlob || null;
  currentImage = card.imageBlob ? await loadImageFromBlob(card.imageBlob) : null;
  render();
  switchTab('editor');
  toast(asDuplicate ? '복제본을 편집합니다' : '카드를 불러왔습니다');
}

/* ---------- 백업(JSON) 내보내기/가져오기 ---------- */
function blobToBase64(blob) {
  return new Promise((resolve) => {
    if (!blob) return resolve(null);
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}
async function base64ToBlob(dataUrl) {
  if (!dataUrl) return null;
  const res = await fetch(dataUrl);
  return res.blob();
}

$('export-all').addEventListener('click', async () => {
  const cards = await dbApi.all();
  const out = [];
  for (const c of cards) {
    out.push({
      id: c.id, name: c.name, sport: c.sport, rarity: c.rarity, fields: c.fields,
      createdAt: c.createdAt, updatedAt: c.updatedAt,
      imageBlob: await blobToBase64(c.imageBlob),
      thumbBlob: await blobToBase64(c.thumbBlob),
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `panini-cards-backup-${cards.length}.json`);
  toast(`${cards.length}장 백업 완료`);
});

$('import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const arr = JSON.parse(await file.text());
    let n = 0;
    for (const c of arr) {
      await dbApi.put({
        id: c.id || uid(), name: c.name, sport: c.sport, rarity: c.rarity, fields: c.fields,
        createdAt: c.createdAt, updatedAt: c.updatedAt,
        imageBlob: await base64ToBlob(c.imageBlob),
        thumbBlob: await base64ToBlob(c.thumbBlob),
      });
      n++;
    }
    renderGallery();
    toast(`${n}장 가져오기 완료`);
  } catch (err) {
    toast('가져오기 실패: 올바른 백업 파일이 아닙니다');
  }
  e.target.value = '';
});

/* ---------- 토스트 ---------- */
let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- 초기화: 임시저장 복원 ---------- */
(async function init() {
  try {
    const draft = await dbApi.getDraft();
    if (draft) {
      if (draft.fields) fill(draft.fields);
      editingId = draft.editingId || null;
      if (draft.imageBlob) {
        currentImageBlob = draft.imageBlob;
        currentImage = await loadImageFromBlob(draft.imageBlob);
      }
    }
  } catch (e) { /* ignore */ }
  render();
})();
</script>
